<!DOCTYPE html>
<html lang="en">
<head>
<script>
(function(){
  var h = window.location.hash;
  if(h && h.indexOf('#scroll=') === 0){
    var y = parseInt(h.replace('#scroll=',''), 10);
    if(!isNaN(y)){
      history.replaceState(null, '', window.location.pathname + window.location.search);
      window.addEventListener('load', function(){
        setTimeout(function(){ window.scrollTo({top:y, behavior:'instant'}); }, 50);
      });
    }
  }
  document.addEventListener('click', function(e){
    var link = e.target.closest('a[href]');
    if(!link) return;
    var href = link.getAttribute('href');
    if(href && href.indexOf('404page') !== -1){
      var sy = window.scrollY || window.pageYOffset;
      var base = window.location.href.split('#')[0];
      sessionStorage.setItem('stackly_ref', sy > 100 ? base + '#scroll=' + sy : base);
    }
  });
  window.goTo404 = function(){
    var sy = window.scrollY || window.pageYOffset;
    var base = window.location.href.split('#')[0];
    sessionStorage.setItem('stackly_ref', sy > 100 ? base + '#scroll=' + sy : base);
    window.location.href = './404page.html';
  };
})();
</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found | Stackly</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --gold:       #c9a227;
      --gold-light: #e8c55a;
      --gold-dark:  #9a7a1a;
    }
    html { scroll-behavior: smooth; }
    body {
      background: black;
      color: #222;
      font-family: 'Lato', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 79px, rgba(201,162,39,.06) 80px),
        repeating-linear-gradient(90deg, transparent, transparent 79px, rgba(201,162,39,.06) 80px);
      pointer-events: none;
      z-index: 0;
    }
    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 40px 24px;
      max-width: 560px;
      width: 100%;
      animation: fadeUp .8s .2s both;
    }
    .label {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: .7rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 700;
      margin-bottom: 20px;
    }
    .label::before, .label::after {
      content: '';
      width: 24px;
      height: 1px;
      background: var(--gold);
      flex-shrink: 0;
    }
    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(5rem, 18vw, 9rem);
      font-weight: 700;
      line-height: 1;
      color: #222;
      letter-spacing: -4px;
      margin-bottom: 8px;
    }
    h1 span { color: var(--gold); font-style: italic; }
    h2 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(1.2rem, 4vw, 1.6rem);
      font-weight: 600;
      color: #333;
      margin-bottom: 16px;
    }
    p {
      color: #777;
      font-size: .95rem;
      line-height: 1.7;
      font-weight: 300;
      margin-bottom: 40px;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
    }
    .divider {
      width: 40px;
      height: 1px;
      background: var(--gold);
      margin: 24px auto;
      opacity: .5;
    }
    .btn-group {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn-primary {
      padding: 13px 28px;
      background: var(--gold);
      color: #fff;
      border: none;
      font-family: 'Lato', sans-serif;
      font-weight: 700;
      font-size: .8rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 2px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 4px 18px rgba(201,162,39,.25);
      transition: background .3s, transform .2s, box-shadow .3s;
    }
    .btn-primary:hover {
      background: var(--gold-light);
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(201,162,39,.35);
    }
    .btn-ghost {
      padding: 13px 28px;
      background: transparent;
      color: #444;
      border: 1.5px solid rgba(0,0,0,.18);
      font-family: 'Lato', sans-serif;
      font-weight: 700;
      font-size: .8rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 2px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: border-color .3s, color .3s, transform .2s, background .3s;
    }
    .btn-ghost:hover {
      border-color: var(--gold);
      color: var(--gold);
      background: rgba(201,162,39,.05);
      transform: translateY(-2px);
    }
    .footer-note {
      margin-top: 48px;
      font-size: .72rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #bbb;
      font-weight: 400;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @media (max-width: 480px) {
      h1 { letter-spacing: -2px; }
      .btn-group { flex-direction: column; align-items: center; }
      .btn-primary, .btn-ghost { width: 100%; justify-content: center; }
    }
  </style>
<script src="main.js" defer></script>
</head>
<body>
  <div class="container">
    <div class="label">Stackly</div>
    <h1>4<span>0</span>4</h1>
    <div class="divider"></div>
    <h2>Page Not Found</h2>
    <p>The page you are looking for doesn't exist, has been moved, or is temporarily unavailable.</p>
    <div class="btn-group">
      <button onclick="goBack()" class="btn-ghost">&#8592; Go Back</button>
      <a href="./index.html" class="btn-primary">&#8962; Go Home</a>
    </div>
    <p class="footer-note">&copy; 2026 Stackly &middot; All Rights Reserved</p>
  </div>

  <script>
    function goBack() {
      /* Reads the exact URL saved by main.js before any 404 navigation.
         The URL may contain #scroll=Y to restore vertical scroll position. */
var referrer = sessionStorage.getItem('stackly_ref');
if (referrer) {
  sessionStorage.removeItem('stackly_ref');
  window.location.href = referrer;
      } else if (document.referrer && document.referrer !== window.location.href) {
        window.location.href = document.referrer;
      } else {
        window.location.href = './index.html';
      }
    }
  </script>
</body>
</html>
